datasets:
  - path: "C:/Users/blank/Downloads/passenger counting.v8i.yolo26"
    name: passenger_counting
    class_map:
      0: 0   # head -> person
    box_style: head
    splits: [train, valid, test]

  - path: "C:/Users/blank/Downloads/crowdhuman_yolo"
    name: crowdhuman
    class_map:
      0: 0   # head -> person
    box_style: head           # converted from CrowdHuman hbox (see scripts/convert_crowdhuman.py)
    splits: [train]           # train-only: dense crowds belong in training, not in the
                              # validation yardstick (keeps val comparable to passenger domain)

output:
  path: ./merged_dataset
  classes:
    - person
  target_box_style: head     # normalize all boxes to head style
  seed: 42
