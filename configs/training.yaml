# ── Architecture ───────────────────────────────────────────────────────────────
# arch: "cbam"    → loads configs/yolov8n_cbam.yaml + transfers backbone weights
# arch: "default" → uses base_model directly (plain YOLOv8n, no attention)
arch: cbam
base_model: yolov8n.pt   # pretrained backbone source for weight transfer

# ── Training ──────────────────────────────────────────────────────────────────
epochs: 300
batch: 32          # RTX 5080 16 GB VRAM
imgsz: 640         # train at 640 — export smaller for Pi4 separately
patience: 30
workers: 8
device: "0"        # CUDA device 0 (RTX 5080)

# ── Paths ─────────────────────────────────────────────────────────────────────
dataset: ./merged_dataset/data.yaml
runs_dir: ./runs
run_name: passenger_yolov8

# ── Export for Raspberry Pi 4 (ARM Cortex-A72, no GPU) ───────────────────────
export:
  format: ncnn     # ncnn = fastest on ARM NEON (~3-5× vs onnxruntime)
                   # fallback to onnx if pnnx/ncnn tools are unavailable
  simplify: true   # ONNX simplification (applied before ncnn conversion)
  opset: 17
  int8: false      # INT8: ~2× faster but needs representative calibration images
  half: false      # FP16: no benefit on Pi4 ARM (no FP16 SIMD)

# ── Deploy via Cloudflare Worker ──────────────────────────────────────────────
deploy:
  enabled: false
  worker_url: ""
  api_key: ""
  timeout_seconds: 120
